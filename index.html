<style>
  :root{
    --bg:#FCE7EC; --bg2:#FBDCE4; --surface:#FFFFFF; --surface-2:#FFF4F7;
    --ink:#4A2C35; --ink-soft:#8A6670; --line:#F4D3DD;
    --green:#3E7A52; --green-deep:#2F6140; --green-lt:#5B9E6E;
    --gold:#B8923F; --gold-lt:#E1BE6A; --rose:#D96A86; --petal:#F8C6D3; --rk:#BF0000;
    --cjk:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo','PingFang SC','Microsoft YaHei','Malgun Gothic','Apple SD Gothic Neo';
    --display:'Quicksand','Noto Sans Devanagari','Noto Sans Bengali',var(--cjk),system-ui,sans-serif;
    --body:'Inter','Noto Sans Devanagari','Noto Sans Bengali',var(--cjk),system-ui,sans-serif;
    --mono:'DM Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);background-attachment:fixed;color:var(--ink);font-family:var(--body);line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:0 22px;position:relative;z-index:2}
  h1,h2,h3{font-family:var(--display);font-weight:700;line-height:1.14;letter-spacing:-.01em}
  .mono{font-family:var(--mono)}
  a{color:inherit;text-decoration:none}

  .petal-f{position:fixed;top:-30px;z-index:1;pointer-events:none;will-change:transform}
  @keyframes fall{0%{transform:translateY(-30px) rotate(0deg)}100%{transform:translateY(108vh) rotate(420deg)}}
  @media(prefers-reduced-motion:reduce){.petal-f{display:none}}

  nav{position:sticky;top:0;z-index:50;background:rgba(252,231,236,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:19px;color:var(--green)}
  .brand .dot{width:32px;height:32px;border-radius:50%;background:var(--green);color:var(--gold-lt);display:grid;place-items:center;font-size:15px;box-shadow:0 4px 10px rgba(62,122,82,.35)}
  .lang{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 8px 6px 13px}
  .lang svg{color:var(--green)}
  .lang select{border:0;background:none;font-family:var(--body);font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;outline:none;padding-right:4px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--display);font-weight:700;font-size:16px;border-radius:999px;padding:15px 30px;border:0;cursor:pointer;transition:transform .16s, box-shadow .16s}
  .btn-pri{background:linear-gradient(135deg,var(--green-lt),var(--green-deep));color:#fff;box-shadow:0 8px 20px rgba(47,97,64,.34), inset 0 1px 0 rgba(255,255,255,.2)}
  .btn-pri:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(47,97,64,.42)}
  .btn-gold{background:linear-gradient(135deg,var(--gold-lt),var(--gold));color:#3a2a10;box-shadow:0 8px 20px rgba(184,146,63,.34)}
  .btn-gold:hover{transform:translateY(-2px)}
  .btn-ghost{background:var(--surface);color:var(--green);border:1.5px solid var(--green-lt)}
  .btn-ghost:hover{transform:translateY(-2px);background:var(--surface-2)}

  .hero{text-align:center;padding:62px 0 40px}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--gold);background:var(--surface);border:1px solid var(--line);padding:7px 16px;border-radius:999px;margin-bottom:24px}
  .hero h1{font-size:clamp(34px,6vw,58px);color:var(--green-deep);margin-bottom:18px}
  .hero h1 .ro{color:var(--rose)}
  .hero p.sub{font-size:18px;color:var(--ink-soft);max-width:32em;margin:0 auto 30px}
  .hero .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .hero .note{font-size:13.5px;color:var(--ink-soft);margin-top:18px}

  /* share flow */
  .shareflow{max-width:780px;margin:14px auto 0;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:0 14px 36px -22px rgba(150,70,95,.4)}

  .chips{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap}
  .chip.rk{background:var(--rk);color:#fff;border-color:var(--rk)}
  .chip.share{background:#fff;color:var(--rose);border:1.5px solid var(--rose)}
  .chip.line{background:#06C755;color:#fff;border-color:#06C755}
  .chip.bot{background:var(--gold);color:#3a2a10;border-color:var(--gold)}
  .chip.link{background:var(--green);color:#fff;border-color:var(--green)}
  .arrow{color:var(--rose);font-weight:800;font-size:15px}

  .peek{max-width:330px;margin:34px auto 0;background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 20px 50px -20px rgba(150,70,95,.4)}
  .peek .ph-top{display:flex;align-items:center;gap:9px;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:13px}
  .peek .ava{width:32px;height:32px;border-radius:50%;background:var(--green);color:var(--gold-lt);display:grid;place-items:center;font-weight:700;font-family:var(--display)}
  .peek .nm{font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink)}
  .bub{max-width:84%;padding:9px 13px;border-radius:15px;font-size:13px;line-height:1.45;margin-bottom:9px}
  .bub.usr{background:var(--green);color:#fff;margin-left:auto;border-bottom-right-radius:5px}
  .bub.usr.share{display:flex;align-items:center;gap:7px;font-family:var(--body);font-weight:600}
  .bub.bot{background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bub.bot b{color:var(--green)}
  .bub.link{font-family:var(--mono);font-size:11px;word-break:break-all;background:#fff;border:1px dashed var(--green-lt);color:var(--green-deep)}

  section{padding:54px 0}
  .sec-head{text-align:center;max-width:33em;margin:0 auto 40px}
  .sec-head .tag{font-size:12.5px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px}
  .sec-head h2{font-size:clamp(26px,4vw,40px);color:var(--green-deep)}
  .sec-head p{color:var(--ink-soft);font-size:17px;margin-top:12px}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .step{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px 22px;box-shadow:0 10px 26px -18px rgba(150,70,95,.4)}
  .step .n{width:42px;height:42px;margin-bottom:14px;border-radius:50%;background:linear-gradient(135deg,var(--petal),#fff);border:2px solid var(--green-lt);color:var(--green-deep);font-family:var(--display);font-weight:700;font-size:18px;display:grid;place-items:center}
  .step h3{font-size:16.5px;color:var(--green-deep);margin-bottom:7px;line-height:1.22}
  .step p{font-size:14px;color:var(--ink-soft)}

  .bx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .bx{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:28px 22px;text-align:center;box-shadow:0 10px 26px -18px rgba(150,70,95,.4)}
  .bx .ic{font-size:30px;margin-bottom:12px}
  .bx h3{font-size:17px;color:var(--green-deep);margin-bottom:6px}
  .bx p{font-size:13.5px;color:var(--ink-soft)}

  .cb-card{background:var(--surface);border:1px solid var(--line);border-radius:26px;padding:38px;box-shadow:0 16px 40px -22px rgba(150,70,95,.45);max-width:760px;margin:0 auto}
  .cb-lead{text-align:center;font-size:17px;color:var(--ink);margin-bottom:30px}
  .cb-lead b{color:var(--green);font-weight:700}
  .calc label{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;font-weight:600;margin-bottom:10px}
  .calc label .v{font-family:var(--mono);font-size:17px;color:var(--green)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:8px;background:var(--bg2);outline:none;border:1px solid var(--line)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--green-lt),var(--green-deep));border:4px solid #fff;box-shadow:0 3px 8px rgba(47,97,64,.45);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--green-deep);border:4px solid #fff;cursor:pointer}
  .presets{display:flex;gap:8px;margin:14px 0 26px;flex-wrap:wrap;justify-content:center}
  .presets button{border:1px solid var(--line);background:var(--surface-2);border-radius:999px;padding:7px 15px;font-family:var(--mono);font-size:13px;cursor:pointer;color:var(--ink-soft);transition:.15s}
  .presets button:hover{border-color:var(--green-lt);color:var(--green)}
  .cb-out{background:linear-gradient(135deg,var(--green-lt),var(--green-deep));border-radius:18px;padding:26px;text-align:center;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
  .cb-out .k{font-size:14px;color:var(--gold-lt);font-weight:600}
  .cb-out .amt{font-family:var(--mono);font-size:38px;font-weight:500;line-height:1.08;margin:6px 0}
  .cb-out .note{font-size:12.5px;opacity:.86}

  .faq{display:grid;gap:12px;max-width:760px;margin:0 auto}
  details{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:3px 22px;box-shadow:0 8px 22px -18px rgba(150,70,95,.4)}
  details[open]{background:var(--surface-2)}
  summary{cursor:pointer;list-style:none;padding:18px 0;font-family:var(--display);font-weight:700;font-size:16px;color:var(--green-deep);display:flex;justify-content:space-between;align-items:center;gap:14px}
  summary::-webkit-details-marker{display:none}
  summary .pm{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;transition:.25s;color:var(--green)}
  details[open] summary .pm{transform:rotate(45deg);background:var(--green);color:#fff;border-color:var(--green)}
  details .ans{padding:0 0 20px;color:var(--ink-soft);font-size:15px}

  .final{text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:28px;padding:58px 30px;box-shadow:0 18px 44px -24px rgba(150,70,95,.5);position:relative;overflow:hidden}
  .final::before,.final::after{content:"🌸";position:absolute;font-size:60px;opacity:.25}
  .final::before{top:14px;left:18px;transform:rotate(-15deg)}
  .final::after{bottom:10px;right:18px;transform:rotate(20deg)}
  .final h2{font-size:clamp(28px,4.4vw,42px);color:var(--green-deep);margin-bottom:14px;position:relative}
  .final p{color:var(--ink-soft);font-size:18px;margin-bottom:28px;position:relative}

  footer{padding:36px 0 54px;text-align:center}
  footer p{font-size:12.5px;color:var(--ink-soft);max-width:54em;margin:0 auto}

  .rv{opacity:0;transform:translateY(18px);transition:opacity .6s ease, transform .6s ease}
  .rv.in{opacity:1;transform:none}

  @media(max-width:880px){.steps,.bx-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.steps,.bx-grid{grid-template-columns:1fr}.wrap{padding:0 18px}.cb-card{padding:24px}section{padding:46px 0}.chip{font-size:12.5px;padding:8px 12px}}
  @media(prefers-reduced-motion:reduce){.rv{transition:none;opacity:1;transform:none}.btn:hover{transform:none}}
</style>
</head>

  hero_sub:{vi:"Chỉ cần bấm nút Share của Rakuten rồi gửi vào bot オトク — bot tự trả lại link hoàn tiền. Bạn bấm link đó mua như bình thường, tiền tự về số dư. Hoàn toàn miễn phí.",ja:"楽天の「シェア」ボタンを押してオトクBotに送るだけ。botが還元リンクを自動で返信します。そのリンクから普通に購入すれば残高に反映。完全無料。",zh:"只需点乐天的“分享”按钮发给オトクBot——bot会自动回复返现链接。点该链接照常购买，钱自动进余额。完全免费。",ko:"라쿠텐 ‘공유’ 버튼을 눌러 オトク Bot에 보내기만 하면, 봇이 캐시백 링크를 자동으로 보냅니다. 그 링크로 평소처럼 구매하면 잔액에 적립. 완전 무료.",ne:"Rakuten को ‘Share’ बटन थिचेर オトク Bot लाई पठाउनुहोस् — बटले क्यासब्याक लिङ्क स्वतः फिर्ता पठाउँछ। त्यही लिङ्कबाट सधैंझैं किन्नुहोस्, पैसा ब्यालेन्समा। पूर्ण निःशुल्क।",bn:"শুধু Rakuten-এর ‘Share’ বোতাম চেপে オトク Bot-এ পাঠান — বট নিজেই ক্যাশব্যাক লিঙ্ক ফেরত দেবে। সেই লিঙ্কে স্বাভাবিকভাবে কিনুন, টাকা ব্যালেন্সে। সম্পূর্ণ ফ্রি।",en:"Just tap Rakuten's Share button and send it to オトク Bot — the bot replies with a cashback link automatically. Buy through that link as usual and the money lands in your balance. Completely free."},

  how_sub:{vi:"Bạn vẫn mua trực tiếp trên Rakuten — bot chỉ giúp lấy link hoàn tiền, không qua trung gian thanh toán.",ja:"購入は楽天で直接。botは還元リンクを用意するだけで、支払いの仲介はしません。",zh:"你仍直接在乐天购买——bot只帮你拿返现链接，不经过支付中介。",ko:"구매는 라쿠텐에서 직접. 봇은 캐시백 링크만 만들 뿐 결제를 중개하지 않습니다.",ne:"किनमेल सिधै Rakuten मै — बटले क्यासब्याक लिङ्क मात्र दिन्छ, भुक्तानी बिचौलिया होइन।",bn:"কেনাকাটা সরাসরি Rakuten-এই — বট শুধু ক্যাশব্যাক লিঙ্ক দেয়, পেমেন্ট মধ্যস্থতা করে না।",en:"You still buy directly on Rakuten — the bot only provides the cashback link, it's not a payment middleman."},

  cb_lead:{vi:"Với mỗi đơn, bạn được hoàn lại <b>50–80% tiền hoa hồng</b> tùy món hàng. Bạn vẫn mua đúng giá Rakuten, không tốn thêm đồng nào.",ja:"ご注文ごとに、商品に応じて<b>手数料の50〜80%</b>を還元。楽天と同じ価格で、追加費用は一切なし。",zh:"每笔订单，按商品返还<b>佣金的50–80%</b>。仍是乐天原价，不额外花一分钱。",ko:"주문마다 상품에 따라 <b>수수료의 50–80%</b>를 돌려드립니다. 라쿠텐과 같은 가격, 추가 비용 없음.",ne:"हरेक अर्डरमा, सामान अनुसार <b>कमिसनको ५०–८०%</b> फिर्ता। Rakuten कै मूल्यमा, थप खर्च छैन।",bn:"প্রতিটি অর্ডারে, পণ্য অনুযায়ী <b>কমিশনের ৫০–৮০%</b> ফেরত পান। Rakuten-এর একই দামে, কোনো বাড়তি খরচ নেই।",en:"On each order you get back <b>50–80% of the commission</b>, depending on the item. Same Rakuten price, nothing extra to pay."},

  cb_out_note:{vi:"Ước tính ở mức hoa hồng ~4%, hoàn 50–80% tùy món. Có thể cao/thấp hơn theo từng shop.",ja:"手数料~4%・還元50〜80%での目安。商品やショップにより変動します。",zh:"按佣金~4%、返还50–80%估算。会因商品和店铺而不同。",ko:"수수료 ~4%, 캐시백 50–80% 기준 추정. 상품·매장에 따라 달라질 수 있습니다.",ne:"~४% कमिसन र ५०–८०% फिर्ता मानेर अनुमान। सामान/पसल अनुसार फरक हुन सक्छ।",bn:"~৪% কমিশন ও ৫০–৮০% ক্যাশব্যাক ধরে আনুমানিক। পণ্য/দোকান অনুযায়ী বদলাতে পারে।",en:"Estimate at ~4% commission and 50–80% cashback. Varies by item and shop."},

  faq_tag:{vi:"Hỏi đáp",ja:"Q&A",zh:"问答",ko:"질문과 답변",ne:"प्रश्नोत्तर",bn:"প্রশ্নোত্তর",en:"FAQ"},
  faq_title:{vi:"Câu hỏi thường gặp",ja:"よくある質問",zh:"常见问题",ko:"자주 묻는 질문",ne:"प्रायः सोधिने प्रश्न",bn:"সাধারণ প্রশ্ন",en:"Frequently asked questions"},
  q6:{vi:"Tôi “Share” vào bot kiểu gì?",ja:"どうやってbotに「シェア」する？",zh:"怎么“分享”给bot？",ko:"봇에 어떻게 ‘공유’하나요?",ne:"बटमा कसरी ‘Share’ गर्ने?",bn:"বটে কীভাবে ‘Share’ করব?",en:"How do I “Share” to the bot?"},
  a6:{vi:"Mở sản phẩm trên Rakuten → bấm nút Share (シェア) → chọn LINE → chọn オトク Bot. Bot sẽ tự trả lại link hoàn tiền cho bạn mua.",ja:"楽天で商品を開く →「シェア」→ LINE → オトクBotを選ぶだけ。botが還元リンクを返します。",zh:"在乐天打开商品 →点“分享”→选LINE →选オトクBot。bot会回复返现链接供你购买。",ko:"라쿠텐에서 상품 열기 → ‘공유’ → LINE → オトク Bot 선택. 봇이 캐시백 링크를 보냅니다.",ne:"Rakuten मा सामान खोल्नुहोस् → ‘Share’ → LINE → オトク Bot रोज्नुहोस्। बटले क्यासब्याक लिङ्क पठाउँछ।",bn:"Rakuten-এ পণ্য খুলুন → ‘Share’ → LINE → オトク Bot বেছে নিন। বট ক্যাশব্যাক লিঙ্ক পাঠাবে।",en:"Open the item on Rakuten → tap Share → choose LINE → pick オトク Bot. The bot returns a cashback link to buy from."},
  q1:{vi:"Tôi có mất phí không?",ja:"費用はかかりますか？",zh:"需要付费吗？",ko:"비용이 드나요?",ne:"मलाई शुल्क लाग्छ?",bn:"আমার কি খরচ লাগবে?",en:"Are there any fees?"},
  a1:{vi:"Không. Hoàn toàn miễn phí. Bạn mua đúng giá trên Rakuten, còn được nhận thêm tiền hoàn.",ja:"いいえ。完全無料です。楽天と同じ価格で購入でき、さらに還元も受け取れます。",zh:"不需要。完全免费。你以乐天原价购买，还能额外获得返现。",ko:"아니요. 완전 무료입니다. 라쿠텐과 같은 가격에 구매하고 캐시백도 받습니다.",ne:"छैन। पूर्ण निःशुल्क। Rakuten कै मूल्यमा किन्नुहुन्छ र थप क्यासब्याक पनि।",bn:"না। সম্পূর্ণ ফ্রি। Rakuten-এর একই দামে কিনে উপরন্তু ক্যাশব্যাক পাবেন।",en:"No. It's completely free. You pay the normal Rakuten price and still get cashback."},
  q2:{vi:"Khi nào tôi nhận được tiền?",ja:"いつお金を受け取れますか？",zh:"我什么时候能拿到钱？",ko:"언제 받나요?",ne:"पैसा कहिले पाउँछु?",bn:"টাকা কখন পাব?",en:"When do I get the money?"},
  a2:{vi:"Sau khi Rakuten xác nhận đơn của bạn (thường vài ngày đến cuối tháng), tiền sẽ vào số dư.",ja:"楽天が注文を確定した後（通常は数日〜月末）、残高に反映されます。",zh:"在乐天确认订单后（通常几天到月底），金额会进入你的余额。",ko:"라쿠텐이 주문을 확정한 후(보통 며칠~월말) 잔액에 반영됩니다.",ne:"Rakuten ले अर्डर पुष्टि गरेपछि (केही दिनदेखि महिनाको अन्त्यसम्म) ब्यालेन्समा आउँछ।",bn:"Rakuten অর্ডার নিশ্চিত করার পর (কয়েক দিন থেকে মাসের শেষ) ব্যালেন্সে আসবে।",en:"After Rakuten confirms your order (usually a few days to end of month), it's added to your balance."},
  q3:{vi:"Rút tiền thế nào?",ja:"出金方法は？",zh:"如何提现？",ko:"출금은 어떻게 하나요?",ne:"पैसा कसरी निकाल्ने?",bn:"টাকা কীভাবে তুলব?",en:"How do I withdraw?"},
  a3:{vi:"Khi số dư đạt mức tối thiểu, bấm “Rút tiền” trong menu và làm theo hướng dẫn.",ja:"残高が最低額に達したら、メニューの「出金」を押して手順に従ってください。",zh:"当余额达到最低额度时，点击菜单中的“提现”并按指引操作。",ko:"잔액이 최소 금액에 도달하면 메뉴의 ‘출금’을 눌러 안내를 따르세요.",ne:"ब्यालेन्स न्यूनतम सीमा पुगेपछि मेनुमा “निकासी” थिचेर निर्देशन पालना गर्नुहोस्।",bn:"ব্যালেন্স ন্যূনতম সীমায় পৌঁছালে মেনুতে “উত্তোলন” চেপে নির্দেশ অনুসরণ করুন।",en:"When your balance reaches the minimum, tap “Withdraw” in the menu and follow the steps."},
  q4:{vi:"Có an toàn không?",ja:"安全ですか？",zh:"安全吗？",ko:"안전한가요?",ne:"सुरक्षित छ?",bn:"এটা কি নিরাপদ?",en:"Is it safe?"},
  a4:{vi:"Bạn mua trực tiếp trên Rakuten. Bot chỉ tạo link và tính tiền hoàn — không giữ thông tin thanh toán của bạn.",ja:"購入は楽天で直接行います。botはリンク作成と還元計算をするだけで、お支払い情報は保持しません。",zh:"你直接在乐天购买。bot只生成链接和计算返现，不保存你的支付信息。",ko:"구매는 라쿠텐에서 직접 합니다. 봇은 링크 생성과 캐시백 계산만 하며 결제 정보를 보관하지 않습니다.",ne:"तपाईं सिधै Rakuten मा किन्नुहुन्छ। बटले लिङ्क र क्यासब्याक मात्र गर्छ — भुक्तानी जानकारी राख्दैन।",bn:"আপনি সরাসরি Rakuten-এ কেনেন। বট শুধু লিঙ্ক ও ক্যাশব্যাক হিসাব করে — পেমেন্ট তথ্য রাখে না।",en:"You buy directly on Rakuten. The bot only creates the link and calculates cashback — it never stores your payment details."},
  q5:{vi:"Lỡ mua mà không bấm link bot thì sao?",ja:"botのリンクを押さずに買ったら？",zh:"如果没点bot的链接就买了怎么办？",ko:"봇 링크를 누르지 않고 샀다면?",ne:"बटको लिङ्क नथिची किने भने?",bn:"বটের লিঙ্ক না চেপে কিনলে?",en:"What if I buy without the bot's link?"},
  a5:{vi:"Phải mua qua đúng link bot gửi thì mới được tính hoàn tiền. Hãy luôn bấm link đó trước khi đặt hàng.",ja:"botが送ったリンクから購入した場合のみ還元対象です。注文前に必ずそのリンクを押してください。",zh:"只有通过bot发送的链接购买才能获得返现。下单前请务必点击该链接。",ko:"봇이 보낸 링크로 구매할 때만 캐시백이 적용됩니다. 주문 전에 반드시 그 링크를 누르세요.",ne:"बटले पठाएकै लिङ्कबाट किन्दा मात्र क्यासब्याक गनिन्छ। अर्डरअघि सधैं त्यही लिङ्क थिच्नुहोस्।",bn:"শুধু বটের পাঠানো লিঙ্ক থেকে কিনলেই ক্যাশব্যাক গণনা হয়। অর্ডারের আগে সেই লিঙ্কে ট্যাপ করুন।",en:"Cashback only counts if you buy through the bot's link. Always tap it before ordering."},

  final_title:{vi:"Bắt đầu nhận tiền hôm nay",ja:"今日から受け取り開始",zh:"今天就开始拿返现",ko:"오늘부터 받아보세요",ne:"आजै कमाउन सुरु गर्नुहोस्",bn:"আজই শুরু করুন",en:"Start earning today"},
  final_sub:{vi:"Kết bạn với bot, Share sản phẩm đầu tiên và xem tiền về.",ja:"botを友だち追加して、最初の商品をシェアして、還元を確認しましょう。",zh:"加bot为好友，分享第一个商品，看着钱回来。",ko:"봇을 친구 추가하고 첫 상품을 공유해 캐시백을 확인하세요.",ne:"बटसँग साथी बन्नुहोस्, पहिलो सामान Share गर्नुहोस्, पैसा फर्केको हेर्नुहोस्।",bn:"বটকে বন্ধু বানান, প্রথম পণ্য Share করুন, টাকা ফেরত দেখুন।",en:"Add the bot, Share your first item, and watch the money come back."},
  final_cta:{vi:"Thêm bạn trên LINE 🌸",ja:"LINEで友だち追加 🌸",zh:"在LINE加好友 🌸",ko:"LINE 친구 추가 🌸",ne:"LINE मा साथी थप्नुहोस् 🌸",bn:"LINE-এ বন্ধু যোগ করুন 🌸",en:"Add on LINE 🌸"},
  footer_fine:{vi:"オトク không trực thuộc và không được tài trợ bởi Rakuten hay LINE. Tiền hoàn phụ thuộc vào việc Rakuten xác nhận đơn hàng.",ja:"オトクは楽天およびLINEと提携・出資関係にありません。還元は楽天が注文を確定した場合にのみ受け取れます。",zh:"オトク与乐天或LINE无任何关联或赞助关系。返现仅在乐天确认订单后发放。",ko:"オトク는 라쿠텐 또는 LINE과 제휴·후원 관계가 없습니다. 캐시백은 라쿠텐이 주문을 확정한 경우에만 지급됩니다.",ne:"オトク, Rakuten वा LINE सँग सम्बन्धित वा प्रायोजित होइन। क्यासब्याक Rakuten ले अर्डर पुष्टि गरेमा मात्र पाइन्छ।",bn:"オトク, Rakuten বা LINE-এর সাথে যুক্ত বা স্পনসর্ড নয়। Rakuten অর্ডার নিশ্চিত করলে তবেই ক্যাশব্যাক পাওয়া যায়।",en:"オトク is not affiliated with or sponsored by Rakuten or LINE. Cashback depends on Rakuten confirming the order."}
};

const yen=n=>'¥'+Math.round(n).toLocaleString('en-US');
function sp(p){document.getElementById('price').value=p;calc();}
function calc(){
  const price=+document.getElementById('price').value;
  document.getElementById('vPrice').textContent=yen(price);
  const low=price*0.04*0.5, high=price*0.04*0.8;
  document.getElementById('oCash').textContent='~'+yen(low)+' – '+yen(high);
}
function setLang(l){
  document.documentElement.lang=l;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(I18N[k] && I18N[k][l]!=null) el.innerHTML=I18N[k][l];
  });
  const sel=document.getElementById('langSel'); if(sel) sel.value=l;
}
(function(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors=['#F8C6D3','#FADCE4','#F4B8C8','#FFE3EA'];
  for(let i=0;i<9;i++){
    const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 20 20');s.classList.add('petal-f');
    const w=12+Math.random()*12; s.style.width=w+'px';s.style.height=w+'px';
    s.style.left=Math.random()*100+'vw'; s.style.opacity=(.4+Math.random()*.4).toFixed(2);
    const dur=(9+Math.random()*9).toFixed(1);
    s.style.animation=`fall ${dur}s linear ${(-Math.random()*dur).toFixed(1)}s infinite`;
    s.innerHTML=`<path d="M10 1 C13 5 18 7 17 12 C16 17 12 19 10 19 C8 19 4 17 3 12 C2 7 7 5 10 1 Z" fill="${colors[i%colors.length]}"/>`;
    document.body.appendChild(s);
  }
})();
const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});
document.querySelectorAll('.rv').forEach(el=>io.observe(el));
setLang('vi'); calc();
</script>
